<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>梦幻世界</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  height:100vh;overflow:hidden;
  font-family:"华文楷体","KaiTi","Microsoft YaHei",serif;
  background-image:url("u=1792083036,3890024348&fm=253&fmt=auto&app=120&f=JPEG.webp");
  background-size:cover;
  background-position:center;
  position:relative;
}

.hd{position:absolute;top:22px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;}
.hd h1{font-size:72px;color:#FFFFFF;text-shadow:0 2px 4px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);letter-spacing:18px;font-weight:700;animation:slideLeft 1.2s ease-out forwards, floatUpDown 3s ease-in-out 1.2s infinite;}
.hd p{font-size:26px;color:#FFFFFF;margin-top:10px;letter-spacing:5px;font-weight:400;text-shadow:0 2px 4px rgba(0,0,0,0.5), 0 3px 8px rgba(0,0,0,0.3);animation:slideRight 1.2s ease-out forwards, floatUpDown2 3s ease-in-out 1.2s infinite;}

@keyframes slideLeft{0%{transform:translateX(-80px);opacity:0;}100%{transform:translateX(0);opacity:1;}}
@keyframes slideRight{0%{transform:translateX(80px);opacity:0;}100%{transform:translateX(0);opacity:1;}}
@keyframes floatUpDown{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes floatUpDown2{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
</style>
</head>
<body>

<div class="hd">
  <h1>花海</h1>
  <p>你好，欢迎来到花海</p>
</div>

</body>
</html>
