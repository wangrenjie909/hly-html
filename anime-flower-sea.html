<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花海 · 二次元</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:"Microsoft YaHei","PingFang SC",sans-serif;}

/* ── 第一阶段：二次元特效 ── */
#scene-anime{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;
  background:radial-gradient(ellipse at 50% 70%, #1a1040 0%, #0a0a1a 60%, #050510 100%);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 1.2s ease;
}
#scene-anime.fade-out{opacity:0;pointer-events:none;}

/* 魔法光晕 */
.magic-glow{
  position:absolute;top:50%;left:50%;width:500px;height:500px;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(180,140,255,0.08), rgba(100,180,255,0.04), transparent 70%);
  border-radius:50%;
  animation:glowPulse 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes glowPulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.5;}
  50%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}
}

/* canvas 粒子层 */
#particleCanvas{
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
}

/* 闪烁星星 */
.twinkle-stars{
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 8% 15%, rgba(255,255,255,0.8), transparent),
    radial-gradient(3px 3px at 20% 40%, rgba(200,180,255,0.6), transparent),
    radial-gradient(2px 2px at 35% 10%, rgba(255,255,255,0.7), transparent),
    radial-gradient(3px 3px at 50% 50%, rgba(180,200,255,0.5), transparent),
    radial-gradient(2px 2px at 65% 20%, rgba(255,200,220,0.6), transparent),
    radial-gradient(3px 3px at 78% 55%, rgba(200,180,255,0.5), transparent),
    radial-gradient(2px 2px at 90% 30%, rgba(255,255,255,0.6), transparent),
    radial-gradient(3px 3px at 45% 75%, rgba(180,200,255,0.4), transparent),
    radial-gradient(2px 2px at 15% 80%, rgba(255,200,220,0.5), transparent),
    radial-gradient(3px 3px at 70% 70%, rgba(200,180,255,0.4), transparent),
    radial-gradient(2px 2px at 55% 88%, rgba(255,255,255,0.3), transparent),
    radial-gradient(3px 3px at 85% 85%, rgba(180,200,255,0.4), transparent);
  animation:starPulse 2.5s ease-in-out infinite alternate;
}
@keyframes starPulse{0%{opacity:0.3;}100%{opacity:0.9;}}

/* ── 居中标题 ── */
.anime-title{
  position:relative;z-index:3;text-align:center;
}
.anime-title .jp{
  font-size:72px;font-weight:900;letter-spacing:14px;
  background:linear-gradient(135deg, #FFB7C5, #C8A8FF, #A8D8FF, #FFB7C5);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradientFlow 3s ease infinite, titleIn 1.2s ease-out forwards;
  opacity:0;
  filter:drop-shadow(0 0 30px rgba(200,168,255,0.2));
}
@keyframes titleIn{
  0%{transform:translateY(50px) scale(0.7);opacity:0;letter-spacing:40px;filter:blur(10px);}
  60%{transform:translateY(-8px) scale(1.05);opacity:1;}
  100%{transform:translateY(0) scale(1);opacity:1;letter-spacing:14px;filter:blur(0);}
}
@keyframes gradientFlow{
  0%,100%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
}

.anime-title .sub{
  font-size:16px;color:rgba(255,255,255,0.3);
  letter-spacing:14px;font-weight:300;margin-top:10px;
  animation:subFade 1.5s 0.5s forwards;opacity:0;
}
@keyframes subFade{to{opacity:1;letter-spacing:12px;}}

/* 进度条 */
.progress-bar{
  position:fixed;top:0;left:0;height:3px;z-index:20;
  background:linear-gradient(90deg, #A8D8FF, #C8A8FF, #FFB7C5);
  background-size:200% auto;
  animation:barShine 2s linear infinite;
  transition:width 0.15s linear;
  width:0%;
  box-shadow:0 0 15px rgba(168,200,255,0.3);
}
@keyframes barShine{0%{background-position:0%}100%{background-position:200%}}

/* 氛围文字飘落 */
.falling-char{
  position:fixed;z-index:2;pointer-events:none;
  font-size:18px;font-weight:100;
  animation:charFall linear forwards;
  opacity:0;
}
@keyframes charFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:0;}
  15%{opacity:0.5;}
  85%{opacity:0.3;}
  100%{transform:translateY(105vh) rotate(360deg);opacity:0;}
}

/* ── 第二阶段：花海世界 ── */
#scene-flower{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;
  opacity:0;transition:opacity 1.5s ease;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
}
#scene-flower.show{opacity:1;}

.flower-bg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(180deg, #0a1628 0%, #1a3050 25%, #2a5070 50%, #3a7090 75%, #5a90b0 100%);
  z-index:-1;
}
.flower-bg::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:
    radial-gradient(120px 120px at 15% 20%, rgba(100,200,255,0.1), transparent),
    radial-gradient(100px 100px at 50% 40%, rgba(180,230,255,0.08), transparent),
    radial-gradient(140px 140px at 80% 60%, rgba(100,200,255,0.06), transparent),
    radial-gradient(80px 80px at 30% 70%, rgba(180,230,255,0.09), transparent);
  pointer-events:none;
}

.flower-petal{
  position:absolute;width:18px;height:18px;
  border-radius:50% 0 50% 0;
  opacity:0;
  animation:petalFloat linear infinite;
}
@keyframes petalFloat{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
  10%{opacity:0.25;}
  90%{opacity:0.15;}
  100%{transform:translateY(-20vh) rotate(720deg);opacity:0;}
}

.flower-text{
  position:relative;z-index:2;
  animation:flowerIn 2s ease-out 0.3s forwards;opacity:0;
}
@keyframes flowerIn{
  0%{transform:translateY(30px);opacity:0;}
  100%{transform:translateY(0);opacity:1;}
}
.flower-text h1{
  font-size:80px;font-weight:900;letter-spacing:16px;
  color:#FFFFFF;
  text-shadow:0 0 40px rgba(100,180,255,0.3),0 0 80px rgba(100,180,255,0.15),0 4px 12px rgba(0,0,0,0.3);
  margin-bottom:16px;
}
.flower-text p{
  font-size:22px;color:rgba(255,255,255,0.7);
  letter-spacing:8px;font-weight:300;
}
.flower-text .poem{
  margin-top:20px;font-size:14px;color:rgba(255,255,255,0.35);
  letter-spacing:4px;line-height:1.8;
}

@media(max-width:600px){
  .anime-title .jp{font-size:40px;letter-spacing:8px;}
  .flower-text h1{font-size:48px;letter-spacing:10px;}
  .flower-text p{font-size:16px;letter-spacing:4px;}
}

.back-btn{
  position:fixed;top:16px;right:16px;z-index:200;
  padding:8px 16px;border-radius:8px;
  background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;
  font-family:"Microsoft YaHei","PingFang SC",sans-serif;letter-spacing:1px;
  text-decoration:none;transition:all 0.3s;
}
.back-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.3);}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← 退出</a>

<div class="progress-bar" id="progressBar"></div>

<!-- ════ 第一阶段：二次元特效 ════ -->
<div id="scene-anime">
  <div class="magic-glow"></div>
  <div class="twinkle-stars"></div>
  <canvas id="particleCanvas"></canvas>
  <div class="anime-title">
    <div class="jp">✦ 花の海 ✦</div>
    <div class="sub">— 二次元の世界へようこそ —</div>
  </div>
</div>

<!-- ════ 第二阶段：花海世界 ════ -->
<div id="scene-flower">
  <div class="flower-bg" id="flowerBg"></div>
  <div class="flower-text">
    <h1>花 海</h1>
    <p>欢迎来到花的世界</p>
    <div class="poem">
      每一朵花，都是星星的眼泪<br>
      每一片海，都是梦的倒影
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  第一阶段：二次元粒子特效 (Canvas)
//  — 魔法阵 / 樱花 / 星点 / 音符 / 字符
// ═══════════════════════════════════════════

const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// —— 粒子池 ——
let particles = [];
const MAX_P = 200;

// 二次元元素符号
const animeChars = ['♪','☆','❤','✦','✿','◦','◈','✧','❀','◇','※','★'];

function spawnParticle(){
  if (particles.length >= MAX_P) return;
  const type = Math.random();
  let p;
  if (type < 0.25) {
    // 樱花花瓣
    p = {
      kind:'petal', x: Math.random()*W, y: -20,
      size: 5+Math.random()*10, spd: 0.4+Math.random()*0.8,
      drift: (Math.random()-0.5)*1.2, rot: Math.random()*6.28,
      rotSpd: (Math.random()-0.5)*0.04, phase: Math.random()*6.28,
      hue: 330+Math.random()*30,
    };
  } else if (type < 0.50) {
    // 魔法光球
    p = {
      kind:'orb', x: Math.random()*W, y: Math.random()*H,
      size: 3+Math.random()*7, spd: -0.2-Math.random()*0.4,
      drift: (Math.random()-0.5)*0.3,
      phase: Math.random()*6.28, life: 0.6+Math.random()*0.4,
      hue: 260+Math.random()*50,
    };
  } else if (type < 0.70) {
    // 飘落字符 (♪ ☆ ✿ 等)
    p = {
      kind:'char', x: Math.random()*W, y: -20,
      char: animeChars[Math.floor(Math.random()*animeChars.length)],
      size: 14+Math.random()*12, spd: 0.3+Math.random()*0.6,
      drift: (Math.random()-0.5)*0.5, rot: 0, rotSpd: (Math.random()-0.5)*0.02,
      hue: 200+Math.random()*80, phase: Math.random()*6.28,
    };
  } else {
    // 星光小点
    p = {
      kind:'star', x: Math.random()*W, y: Math.random()*H,
      size: 1+Math.random()*2.5, spd: -0.1-Math.random()*0.2,
      drift: (Math.random()-0.5)*0.1, phase: Math.random()*6.28,
      hue: 200+Math.random()*80, twinkle: Math.random()*6.28,
      life: 0.8+Math.random()*0.5,
    };
  }
  particles.push(p);
}

// 初始生成
for (let i = 0; i < 60; i++) spawnParticle();

// 鼠标光点
let mx = -999, my = -999;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('touchmove', e => {
  const t = e.touches[0]; if(t){ mx = t.clientX; my = t.clientY; }
});

let time = 0;

function animate(){
  time += 0.016;
  ctx.clearRect(0,0,W,H);

  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.drift || 0;
    p.y += p.spd || 0;
    if (p.rot !== undefined) p.rot += p.rotSpd || 0;

    // 出屏回收
    if (p.y > H+30 || p.x < -40 || p.x > W+40 || (p.life !== undefined && (p.life -= 0.003) <= 0)) {
      particles.splice(i,1); continue;
    }

    const a = p.life !== undefined ? p.life : Math.min(1, (p.y+30)/80);

    switch(p.kind){
      case 'petal': {
        // 樱花花瓣
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = a * 0.5;
        const s = p.size;
        ctx.fillStyle = `hsla(${p.hue}, 70%, 75%, 0.5)`;
        ctx.beginPath();
        ctx.ellipse(0, 0, s*0.5, s, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(0, 0, s, s*0.5, Math.PI/3, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        break;
      }
      case 'orb': {
        // 魔法光球
        const glow = 0.4 + 0.3 * Math.sin(time*2 + p.phase);
        const hue = p.hue + Math.sin(time + p.phase)*15;
        // 外圈
        const grad = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y,p.size*2.5);
        grad.addColorStop(0, `hsla(${hue}, 80%, 75%, ${a*0.3})`);
        grad.addColorStop(1, `hsla(${hue}, 80%, 75%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size*2.5, 0, Math.PI*2);
        ctx.fill();
        // 内核
        ctx.shadowColor = `hsla(${hue}, 80%, 75%, ${a*0.3})`;
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size*glow, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${hue}, 80%, 85%, ${a*0.6})`;
        ctx.fill();
        ctx.shadowBlur = 0;
        break;
      }
      case 'char': {
        // 飘落字符
        const hue = p.hue + Math.sin(time + p.phase)*20;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = a * 0.35;
        ctx.font = `${p.size}px "Microsoft YaHei",sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = `hsla(${hue}, 70%, 75%, 0.5)`;
        ctx.shadowColor = `hsla(${hue}, 70%, 75%, 0.2)`;
        ctx.shadowBlur = 10;
        ctx.fillText(p.char, 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();
        break;
      }
      case 'star': {
        // 星光闪烁
        const flicker = 0.3 + 0.7 * (0.5 + 0.5*Math.sin(time*3 + p.twinkle));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * flicker, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${p.hue}, 60%, 85%, ${flicker*0.5})`;
        ctx.fill();
        break;
      }
    }
  }

  // 鼠标魔法拖尾
  if (mx > 0 && my > 0) {
    for (let i=0; i<2; i++) {
      particles.push({
        kind:'orb', x: mx+(Math.random()-0.5)*15, y: my+(Math.random()-0.5)*15,
        size: 2+Math.random()*4, spd: -0.2-Math.random()*0.3,
        drift: (Math.random()-0.5)*0.2, phase: Math.random()*6.28,
        life: 0.6, hue: 280+Math.random()*40,
      });
    }
  }

  requestAnimationFrame(animate);
}
animate();

// 定时补充粒子
setInterval(spawnParticle, 300);

// 飘落字符生成器
function spawnFallingChar(){
  const el = document.createElement('div');
  el.className = 'falling-char';
  el.textContent = animeChars[Math.floor(Math.random()*animeChars.length)];
  el.style.left = Math.random()*95 + '%';
  el.style.fontSize = (14+Math.random()*16) + 'px';
  el.style.color = `hsla(${200+Math.random()*80}, 60%, 75%, 0.3)`;
  el.style.animationDuration = (6+Math.random()*8) + 's';
  el.style.animationDelay = (Math.random()*2) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 15000);
}
for (let i=0; i<8; i++) setTimeout(spawnFallingChar, i*300);
let fallCharTimer = setInterval(spawnFallingChar, 1200);

// ═══════════════════════════════════════════
//  时间线控制：4 秒切换
// ═══════════════════════════════════════════

const sceneAnime = document.getElementById('scene-anime');
const sceneFlower = document.getElementById('scene-flower');
const progressBar = document.getElementById('progressBar');
const TOTAL = 4;

let startTime = Date.now();

function tick(){
  const elapsed = (Date.now()-startTime)/1000;
  const pct = Math.min(elapsed/TOTAL*100, 100);
  progressBar.style.width = pct + '%';

  if (elapsed >= TOTAL) {
    sceneAnime.classList.add('fade-out');
    sceneFlower.classList.add('show');
    progressBar.style.opacity = '0';
    // 清理二次元掉落字符
    clearInterval(fallCharTimer);
    document.querySelectorAll('.falling-char').forEach(el => el.remove());
    spawnFlowerPetals();
    return;
  }
  requestAnimationFrame(tick);
}
setTimeout(tick, 50);

function spawnFlowerPetals(){
  const bg = document.getElementById('flowerBg');
  const colors = ['#FFB7C5','#A8D8FF','#C8E8FF','#FFD0E0','#B0D8FF','#FFE0E8'];
  for (let i=0; i<25; i++){
    const el = document.createElement('div');
    el.className = 'flower-petal';
    el.style.left = Math.random()*100 + '%';
    el.style.width = el.style.height = (8+Math.random()*14) + 'px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (10+Math.random()*15) + 's';
    el.style.animationDelay = (Math.random()*8) + 's';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    bg.appendChild(el);
  }
}
</script>
</body>
</html>
