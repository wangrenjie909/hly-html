<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 二次元星光</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html, body{
  width:100%;height:100%;
  overflow:hidden;
  background:linear-gradient(180deg, #E8F4FF 0%, #D0E8FF 30%, #A8D0F0 60%, #80B8E0 100%);
}
canvas{
  display:block;
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  cursor:default;
}
.back-btn{
  position:fixed;top:16px;right:16px;z-index:200;
  padding:8px 16px;border-radius:8px;
  background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;
  font-family:"Microsoft YaHei","PingFang SC",sans-serif;letter-spacing:1px;
  text-decoration:none;transition:all 0.3s;
}
.back-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.3);}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← 退出</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 粒子数组
let particles = [];
const MAX = 300;

// 鼠标位置（默认在屏幕中央）
let mx = W/2, my = H/2;
let pmx = mx, pmy = my; // 上一帧位置

document.addEventListener('mousemove', e => {
  pmx = mx; pmy = my;
  mx = e.clientX; my = e.clientY;
  // 鼠标移动时生成新粒子
  const dx = mx - pmx;
  const dy = my - pmy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const count = Math.min(Math.floor(dist / 4) + 2, 10);
  for (let i = 0; i < count; i++) {
    const t = i / count;
    const x = pmx + dx * t + (Math.random() - 0.5) * 4;
    const y = pmy + dy * t + (Math.random() - 0.5) * 4;
    addParticle(x, y);
  }
});

// 触摸支持
document.addEventListener('touchmove', e => {
  const touch = e.touches[0];
  if (!touch) return;
  mx = touch.clientX; my = touch.clientY;
  addParticle(mx, my);
});

// 生成一个粒子
function addParticle(x, y) {
  if (particles.length >= MAX) return;
  particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 0.8,
    vy: (Math.random() - 0.5) * 0.6 - 0.8,
    size: 2 + Math.random() * 6,
    hue: 200 + Math.random() * 30,   // 二次元蓝
    sat: 30 + Math.random() * 50,
    lit: 70 + Math.random() * 25,
    life: 1,                          // 初始透明度系数
    decay: 0.006 + Math.random() * 0.01,
    phase: Math.random() * Math.PI * 2,
  });
}

// 自动生成一些随机漂浮粒子
function spawnAmbient() {
  if (particles.length < MAX * 0.8) {
    addParticle(
      Math.random() * W,
      Math.random() * H
    );
  }
}
setInterval(spawnAmbient, 20);

// 初始铺满屏幕
for (let i = 0; i < 200; i++) {
  addParticle(Math.random() * W, Math.random() * H);
}

// —— 动画循环 ——
let time = 0;

function animate() {
  time += 0.02;

  // 半透明清空 —— 营造星光残影
  ctx.fillStyle = 'rgba(0,2,5,0.08)';
  ctx.fillRect(0, 0, W, H);

  // 更新 & 绘制粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    // 物理
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.vy -= 0.04;  // 上浮
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;

    // 生命耗尽或出屏则移除
    if (p.life <= 0 || p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) {
      particles.splice(i, 1);
      continue;
    }

    // 大小随生命衰减
    // 二次元风格：彩色闪烁
    const twinkle = 0.5 + 0.5 * Math.sin(time * 4 + p.phase);
    const s = p.size * (0.3 + 0.7 * p.life) * (0.7 + 0.3 * twinkle);
    const alpha = p.life * (0.5 + 0.4 * Math.sin(time * 2.5 + p.phase * 1.3));
    const hue = p.hue + Math.sin(time * 0.8 + p.phase) * 20;

    // 外发光
    ctx.shadowColor = `hsla(${hue}, ${p.sat}%, ${p.lit}%, ${alpha * 0.3})`;
    ctx.shadowBlur = 20;

    // 主圆
    ctx.beginPath();
    ctx.arc(p.x, p.y, s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, ${p.sat}%, ${p.lit}%, ${alpha})`;
    ctx.fill();

    // 小星星✨
    ctx.shadowBlur = 0;
    if (i % 3 === 0) {
      var ss = s * 0.6;
      ctx.beginPath();
      for (var k = 0; k < 4; k++) {
        var a2 = Math.PI / 2 * k - Math.PI / 4 + Math.sin(time + p.phase) * 0.2;
        ctx.lineTo(p.x + Math.cos(a2) * ss, p.y + Math.sin(a2) * ss);
        a2 += Math.PI / 4;
        ctx.lineTo(p.x + Math.cos(a2) * ss * 0.4, p.y + Math.sin(a2) * ss * 0.4);
      }
      ctx.closePath();
      ctx.fillStyle = `hsla(${hue + 30}, 60%, 92%, ${alpha * 0.4})`;
      ctx.fill();
    }

    // 粒子间连线（距离近的连成细线——星空感）
    if (i % 2 === 0) {
      for (let j = i - 1; j >= Math.max(0, i - 12); j--) {
        const p2 = particles[j];
        if (!p2) continue;
        const dx = p.x - p2.x;
        const dy = p.y - p2.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = `hsla(${hue}, ${p.sat}%, ${p.lit + 10}%, ${alpha * 0.08 * (1 - dist/120)})`;
          ctx.lineWidth = 0.4;
          ctx.stroke();
        }
      }
    }
  }

  // 鼠标位置周围持续生成粒子（光标拖尾）
  for (let i = 0; i < 5; i++) {
    addParticle(
      mx + (Math.random() - 0.5) * 12,
      my + (Math.random() - 0.5) * 12
    );
  }

  requestAnimationFrame(animate);
}
animate();

// 窗口改变
window.addEventListener('resize', resize);
</script>
</body>
</html>
